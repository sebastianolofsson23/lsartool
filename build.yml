name: Build & Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Zip win-unpacked
        run: |
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "dist\LSAR-Tool-win-x64.zip"
        shell: pwsh

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/LSAR-Tool-win-x64.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac (x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Zip mac apps
        run: |
          cd dist
          zip -r LSAR-Tool-mac-x64.zip "mac/LSAR Tool.app"
          zip -r LSAR-Tool-mac-arm64.zip "mac-arm64/LSAR Tool.app"

      - name: Upload Mac release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/LSAR-Tool-mac-x64.zip
            dist/LSAR-Tool-mac-arm64.zip
